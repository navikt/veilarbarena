name: Deploy til Dev
on:
  workflow_dispatch:

concurrency:
  group: deploy_feature_branch
  cancel-in-progress: true

env:
  PRINT_PAYLOAD: true

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build maven artifacts
        run: mvn -B package

      - name: Build and push Docker image
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512
        id: docker-build-push
        with:
          team: pto # This is not app namespace but team which is admin in github

  deploy-dev:
    name: Deploy application to dev
    needs: build-and-push
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Deploy application
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb
        env:
          CLUSTER: dev-fss
          RESOURCE: nais-dev.yaml
          VAR: image=${{ needs.build-and-push.outputs.image }}
